databases:
  - name: en-chakai-db
    plan: free
    databaseName: en_chakai
    user: en_chakai_user

services:
  - type: web
    name: en-chakai
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: en-chakai-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_ENABLED
        value: "true"
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: OPERATOR_EMAIL
        sync: false
      - key: NEXT_PUBLIC_BASE_URL
        sync: false
