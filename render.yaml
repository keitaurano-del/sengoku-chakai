databases:
  - name: sengoku-chakai-staging-db
    plan: free
    databaseName: sengoku_chakai_staging
    user: sengoku_chakai_staging_user

services:
  - type: web
    name: sengoku-chakai-staging
    runtime: node
    plan: free
    branch: staging
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sengoku-chakai-staging-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_ENABLED
        value: "true"
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: OPERATOR_EMAIL
        sync: false
      - key: NEXT_PUBLIC_BASE_URL
        sync: false
